[tools]
go = "1.26.0"
"go:golang.org/x/tools/gopls" = "0.21.0"
"github:lucasew/workspaced" = "0.3.6"

[tasks.lint]
run = "workspaced codebase lint"

[tasks.fmt]
run = "workspaced codebase format"

[tasks."test:go"]
run = "go test ./..."

[tasks.test]
depends = ["test:*"]

[tasks."codegen:go"]
run = "go generate ./..."

[tasks.codegen]
depends = ["codegen:*"]

[tasks."install:go"]
run = "go mod download"

[tasks.install]
depends = ["install:*"]

[tasks.ci]
depends = ["lint", "test"]
